name: custom_address
description: "A Flutter app that reads Nepal administrative hierarchy data from local JSON assets."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/nepal/administrative_hierarchy.json
